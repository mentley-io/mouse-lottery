name: mouse-lottery

services:
  mongo:
    image: mongo:7
    container_name: mouse-lottery-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: mouse-lottery-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/mouse_lottery
      PORT: 4001
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: mouse-lottery-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: mouse-lottery-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
